<style>
  :root{

<body>
<div id="root"></div>

<script>
/* =========================================================================
   GENERAL LEDGER — upload transactions, classify into a typed chart of
   accounts (Asset / Liability / Equity / Revenue / Expense), filter by
   year, export to Excel. Shared storage — everyone sees the same data.
   Columns: Date, Description, Source, Account, Project, Amount.
   ========================================================================= */

const ACCOUNT_TYPES = ['Asset','Liability','Equity','Revenue','Expense'];
const TYPE_BADGE = { Asset:'badge-asset', Liability:'badge-liability', Equity:'badge-equity', Revenue:'badge-revenue', Expense:'badge-expense', Unassigned:'badge-unassigned' };
const PALETTE_BY_TYPE = { Asset:'var(--slate)', Liability:'var(--maroon)', Equity:'var(--violet)', Revenue:'var(--green)', Expense:'var(--amber)', Unassigned:'#999' };
const UNASSIGNED_ID = 'acc_unassigned';
const TYPE_CODE_BASE = { Asset:1000, Liability:2000, Equity:3000, Revenue:4000, Expense:5000, Unassigned:9000 };
function nextCodeForType(type){
  const base = TYPE_CODE_BASE[type] || 5000;
  const inRange = state.accounts
    .map(a=>parseInt(a.code,10))
    .filter(n=> !isNaN(n) && n>=base && n<base+1000);
  let next = inRange.length ? Math.max.apply(null, inRange)+10 : base;
  if(next >= base+1000) next = base+999; // exceedingly unlikely, but stay in range
  return String(next);
}

function defaultAccounts(){
  const rows = [
    ['1000','Cash','Asset'], ['1010','Accounts Receivable','Asset'],
    ['2000','Accounts Payable','Liability'], ['2010','Unearned Revenue','Liability'],
    ['3000',"Owner's Equity",'Equity'],
    ['4000','Service Revenue','Revenue'], ['4010','Other Income','Revenue'],
    ['5000','Office Supplies','Expense'], ['5010','Utilities','Expense'], ['5020','Rent / Lease','Expense'], ['5030','Insurance','Expense'],
    ['5040','Professional & Legal Fees','Expense'], ['5050','Repairs & Maintenance','Expense'], ['5060','Landscaping & Grounds','Expense'],
    ['5070','Payroll & Wages','Expense'], ['5080','Software & Subscriptions','Expense'], ['5090','Marketing & Advertising','Expense'],
    ['5100','Travel & Meals','Expense'], ['5110','Bank & Merchant Fees','Expense'], ['5120','Taxes & Licenses','Expense']
  ];
  const accs = rows.map(([code,name,type])=>({ id: genId('acc'), code, name, type }));
  accs.push({ id: UNASSIGNED_ID, code:'9999', name:'Unassigned', type:'Unassigned', isDefault:true });
  return accs;
}

function ensureCoreGLAccounts(){
  const core = [
    ['1000','Cash','Asset'], ['1010','Accounts Receivable','Asset'],
    ['2000','Accounts Payable','Liability'], ['2010','Unearned Revenue','Liability'],
    ['3000',"Owner's Equity",'Equity'],
    ['4000','Service Revenue','Revenue'], ['4010','Other Income','Revenue']
  ];
  core.forEach(([code,name,type])=>{
    if(!state.accounts.find(a=>a.name.toLowerCase()===name.toLowerCase())){
      state.accounts.push({ id: genId('acc'), code: state.accounts.find(a=>a.code===code) ? nextCodeForType(type) : code, name, type });
    }
  });
}

/* ---------------------------- state ---------------------------- */
const state = { accounts: [], transactions: [], projects: [], activeTab: 'upload', ready: false, authed: false, currentUser: null, lastActivity: null, saveError: null };

const ui = {
  nameInput: '',
  passcodeInput: '',
  passcodeError: '',
  passcodeBusy: false,
  yearFilter: '',
  toast: null,
  confirmModal: null,
  upload: { stage:null, mapping:{date:null,description:null,source:null,account:null,project:null,amount:null}, result:null },
  ledger: { search:'', accountFilter:'', typeFilter:'', unassignedOnly:false, page:1, editingId:null, editBuffer:{}, addOpen:false, newTx:{date:'',description:'',source:'',projectId:'',amount:'',accountId:''}, sortBy:'date', sortDir:'desc' },
  accounts: { addOpen:false, newAcc:{code:'',name:'',type:'Expense'} },
  projects: { addOpen:false, newProj:{name:'',description:''} }
};

/* ---------------------------- in-app dialogs ----------------------------
   Published artifacts run in a sandboxed iframe that can block native
   window.alert()/confirm() dialogs (they silently do nothing instead of
   throwing), so all confirmations and notices use this in-page UI instead. */
function showToast(message, type){
  const id = genId('toast');
  ui.toast = { id, message, type: type||'warn' };
  render();
  setTimeout(()=>{ if(ui.toast && ui.toast.id===id){ ui.toast = null; render(); } }, 4500);
}
function showConfirmModal(message, onConfirm){
  ui.confirmModal = { message, onConfirm };
  render();
}

/* ---------------------------- helpers ---------------------------- */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function pad2(n){ n=String(n); return n.length<2?'0'+n:n; }
function pad4(n){ n=String(n); while(n.length<4) n='0'+n; return n; }
function genId(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function round2(n){ return Math.round((Number(n)||0)*100)/100; }
function fmtMoney(n){ const v = round2(n); return (v<0?'-':'')+'$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return m+'/'+d+'/'+y; }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/`/g,'&#96;'); }

function parseAmount(v){
  if(v===null||v===undefined||v==='') return 0;
  if(typeof v==='number') return v;
  let s = String(v).trim();
  if(s==='') return 0;
  let neg = false;
  if(/^\(.*\)$/.test(s)){ neg=true; s=s.slice(1,-1); }
  s = s.replace(/[$,]/g,'').replace(/\s/g,'');
  if(s.startsWith('-')){ neg=true; s=s.slice(1); }
  let n = parseFloat(s);
  if(isNaN(n)) return 0;
  return neg ? -n : n;
}

function parseDateToISO(v){
  if(v===null||v===undefined||v==='') return null;
  if(typeof v==='number'){
    const epoch = Date.UTC(1899,11,30);
    const d = new Date(epoch + Math.round(v)*86400000);
    if(isNaN(d.getTime())) return null;
    return d.toISOString().slice(0,10);
  }
  let s = String(v).trim();
  let m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if(m){ return pad4(m[1])+'-'+pad2(m[2])+'-'+pad2(m[3]); }
  m = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/);
  if(m){
    let yr = m[3].length===2 ? ('20'+m[3]) : m[3];
    return pad4(yr)+'-'+pad2(m[1])+'-'+pad2(m[2]);
  }
  let d = new Date(s);
  if(!isNaN(d.getTime())){ return d.toISOString().slice(0,10); }
  return null;
}

function getAccount(id){ return state.accounts.find(a=>a.id===id); }
function findAccountByName(name){
  if(!name) return null;
  const lower = String(name).trim().toLowerCase();
  if(!lower) return null;
  return state.accounts.find(a=>a.name.toLowerCase()===lower) || null;
}
function findAccountByCode(code){
  if(!code) return null;
  const trimmed = String(code).trim();
  if(!trimmed) return null;
  return state.accounts.find(a=>String(a.code)===trimmed) || null;
}
function createAccount(name, type, code){
  const t = type || 'Expense';
  const acc = { id: genId('acc'), code: code ? String(code).trim() : nextCodeForType(t), name: String(name).trim(), type: t };
  state.accounts.push(acc);
  return acc;
}

function getProject(id){ if(!id) return null; return state.projects.find(p=>p.id===id) || null; }
function findProjectByName(name){
  if(!name) return null;
  const lower = String(name).trim().toLowerCase();
  if(!lower) return null;
  return state.projects.find(p=>p.name.toLowerCase()===lower) || null;
}
function createProject(name, description){
  const proj = { id: genId('proj'), name: String(name).trim(), description: description||'' };
  state.projects.push(proj);
  return proj;
}
function projectOptionsHtml(selectedId){
  let html = `<option value="" ${!selectedId?'selected':''}>— none —</option>`;
  state.projects.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(p=>{
    html += `<option value="${p.id}" ${p.id===selectedId?'selected':''}>${escapeHtml(p.name)}</option>`;
  });
  return html;
}

function guessHeader(headers, ...needles){
  for(const h of headers){
    const lower = h.toLowerCase();
    if(needles.some(n=>lower.includes(n))) return h;
  }
  return null;
}

function accountOptionsHtml(selectedId, includeAllOption){
  let html = '';
  if(includeAllOption) html += `<option value="">All accounts</option>`;
  ACCOUNT_TYPES.forEach(type=>{
    const accs = state.accounts.filter(a=>a.type===type).sort((a,b)=>(parseInt(a.code,10)||0)-(parseInt(b.code,10)||0) || a.name.localeCompare(b.name));
    if(accs.length===0) return;
    html += `<optgroup label="${type}">`;
    accs.forEach(a=>{ html += `<option value="${a.id}" ${a.id===selectedId?'selected':''}>${escapeHtml(a.code)} — ${escapeHtml(a.name)}</option>`; });
    html += `</optgroup>`;
  });
  const unassigned = state.accounts.filter(a=>a.type==='Unassigned');
  if(unassigned.length){
    html += `<optgroup label="Unassigned">`;
    unassigned.forEach(a=>{ html += `<option value="${a.id}" ${a.id===selectedId?'selected':''}>${escapeHtml(a.name)}</option>`; });
    html += `</optgroup>`;
  }
  return html;
}

function typeFilterOptionsHtml(selected){
  let html = `<option value="" ${!selected?'selected':''}>All Types</option>`;
  ACCOUNT_TYPES.concat(['Unassigned']).forEach(type=>{
    html += `<option value="${type}" ${type===selected?'selected':''}>${type}</option>`;
  });
  return html;
}

function getAvailableYears(){
  const years = new Set();
  state.transactions.forEach(t=>{ if(t.date && t.date.length>=4) years.add(t.date.slice(0,4)); });
  years.add(String(new Date().getFullYear()));
  return Array.from(years).sort((a,b)=> b.localeCompare(a));
}

function txSignature(date, description, amount, source){
  return date+'|'+String(description||'').trim().toLowerCase()+'|'+round2(amount)+'|'+String(source||'').trim().toLowerCase();
}

const SORT_DEFAULT_DIR = { date:'desc', description:'asc', source:'asc', account:'asc', project:'asc', amount:'desc' };
function sortValue(t, key){
  switch(key){
    case 'date': return t.date || '';
    case 'description': return (t.description||'').toLowerCase();
    case 'source': return (t.source||'').toLowerCase();
    case 'account': { const a = getAccount(t.accountId); return a ? (parseInt(a.code,10)||0) : -1; }
    case 'project': { const p = getProject(t.projectId); return p ? p.name.toLowerCase() : ''; }
    case 'amount': return Number(t.amount)||0;
    default: return t.date || '';
  }
}
function sortTransactions(rows){
  const key = ui.ledger.sortBy || 'date';
  const mult = ui.ledger.sortDir==='asc' ? 1 : -1;
  return rows.slice().sort((a,b)=>{
    const va = sortValue(a,key), vb = sortValue(b,key);
    if(va<vb) return -1*mult;
    if(va>vb) return 1*mult;
    return 0;
  });
}
function sortArrow(key){
  if(ui.ledger.sortBy!==key) return '';
  return ui.ledger.sortDir==='asc' ? ' \u25B2' : ' \u25BC';
}

function transactionsForYear(){
  if(!ui.yearFilter) return state.transactions;
  return state.transactions.filter(t=> t.date && t.date.slice(0,4)===ui.yearFilter);
}

/* ---------------------------- storage backend (Firebase Firestore + Auth) ---------------------------- */
// This app now stores its shared data in Firebase (Firestore) instead of Claude's
// window.storage. That means it works identically no matter where this HTML file
// is opened from — a Claude artifact, GitHub Pages, or even double-clicked locally —
// because the data lives in your own Firebase project, not tied to any one link.

const LEDGER_COLLECTION = 'ledger_data';

const storageBackend = {
  async get(key, shared){
    if(!shared){
      try{
        const raw = window.localStorage.getItem('gl_local_'+key);
        return raw===null ? null : { key, value: raw, shared:false };
      }catch(e){ return null; }
    }
    const snap = await db.collection(LEDGER_COLLECTION).doc(key).get();
    if(!snap.exists) return null;
    const data = snap.data();
    return { key, value: data.value, shared:true };
  },
  async set(key, value, shared){
    if(!shared){
      window.localStorage.setItem('gl_local_'+key, value);
      return { key, value, shared:false };
    }
    await db.collection(LEDGER_COLLECTION).doc(key).set({
      value,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    return { key, value, shared:true };
  }
};

/* ---------------------------- storage (with migration from earlier shapes) ---------------------------- */
async function loadAll(){
  try{
    const r = await storageBackend.get('expense_accounts', true);
    state.accounts = r && r.value ? JSON.parse(r.value) : null;
  }catch(e){ state.accounts = null; }

  if(!state.accounts){
    try{
      const r = await storageBackend.get('expense_categories', true);
      if(r && r.value){
        const old = JSON.parse(r.value);
        state.accounts = old.map(c=> c.isDefault ? { id: UNASSIGNED_ID, name:'Unassigned', type:'Unassigned', isDefault:true } : { id:c.id, name:c.name, type:'Expense' });
      }
    }catch(e){ /* ignore */ }
  }
  if(!state.accounts || state.accounts.length===0){ state.accounts = defaultAccounts(); }

  // backfill type on any account saved before types existed
  state.accounts.forEach(a=>{
    if(!a.type) a.type = (a.id===UNASSIGNED_ID) ? 'Unassigned' : 'Expense';
  });
  if(!state.accounts.find(a=>a.id===UNASSIGNED_ID)) state.accounts.push({ id:UNASSIGNED_ID, name:'Unassigned', type:'Unassigned', isDefault:true });
  // backfill account numbers on any account saved before this field existed
  // (one at a time, so each new assignment sees the ones already given out)
  state.accounts.forEach(a=>{
    if(!a.code) a.code = (a.id===UNASSIGNED_ID) ? '9999' : nextCodeForType(a.type);
  });
  ensureCoreGLAccounts();
  saveAccounts();

  try{
    const r = await storageBackend.get('projects', true);
    state.projects = r && r.value ? JSON.parse(r.value) : [];
  }catch(e){ state.projects = []; }

  try{
    const r = await storageBackend.get('transactions', true);
    state.transactions = r && r.value ? JSON.parse(r.value) : null;
  }catch(e){ state.transactions = null; }
  if(state.transactions===null){
    try{
      const r = await storageBackend.get('expenses', true);
      state.transactions = r && r.value ? JSON.parse(r.value) : [];
    }catch(e){ state.transactions = []; }
  }

  // migrate older transaction shape: vendor->source, categoryId->accountId, free-text project->projectId
  let projectsCreatedDuringMigration = false;
  state.transactions = state.transactions.map(t=>{
    let fixed = t;
    if('vendor' in t || 'categoryId' in t){
      const importedFrom = t.importedFrom!==undefined ? t.importedFrom : (t.source||'');
      fixed = Object.assign({}, t);
      fixed.source = t.vendor!==undefined ? t.vendor : (t.source||'');
      fixed.accountId = t.categoryId || t.accountId || UNASSIGNED_ID;
      fixed.importedFrom = importedFrom;
      delete fixed.vendor;
      delete fixed.categoryId;
    }
    if(fixed.accountId===undefined) fixed.accountId = UNASSIGNED_ID;
    if(fixed.projectId===undefined){
      const oldVal = (fixed.project||'').trim();
      if(oldVal){
        let proj = findProjectByName(oldVal);
        if(!proj){ proj = createProject(oldVal, ''); projectsCreatedDuringMigration = true; }
        fixed.projectId = proj.id;
      } else {
        fixed.projectId = '';
      }
      delete fixed.project;
    }
    return fixed;
  });
  if(projectsCreatedDuringMigration) saveProjects();

  try{
    const r = await storageBackend.get('last_activity', true);
    state.lastActivity = r && r.value ? JSON.parse(r.value) : null;
  }catch(e){ state.lastActivity = null; }

  try{
    const r = await storageBackend.get('last_user', false);
    ui.nameInput = r && r.value ? r.value : '';
  }catch(e){ ui.nameInput = ''; }

  if(state.transactions.length===0) state.activeTab = 'upload';

  state.ready = true;
  render();
}
let writeQueue = Promise.resolve();
function queuedStorageSet(key, value, shared, attempts){
  // Chains onto the queue so this write only starts once every earlier
  // write has fully finished — storage.set calls never overlap.
  const result = writeQueue.then(()=> storageSetWithRetry(key, value, shared, attempts));
  writeQueue = result.catch(()=>{}); // keep the chain alive even if this write ultimately failed
  return result;
}
async function storageSetWithRetry(key, value, shared, attempts=4){
  for(let i=0;i<attempts;i++){
    try{
      const r = await storageBackend.set(key, value, shared);
      if(r) return true;
    }catch(e){
      console.error('storage set failed for', key, '(attempt '+(i+1)+'/'+attempts+')', e);
    }
    if(i<attempts-1) await new Promise(res=>setTimeout(res, 700*(i+1)));
  }
  return false;
}
let autoRetryTimer = null;
function scheduleAutoRetry(){
  if(autoRetryTimer) clearTimeout(autoRetryTimer);
  autoRetryTimer = setTimeout(()=>{
    autoRetryTimer = null;
    if(state.saveError && state.saveError.retry){ state.saveError.retry(); }
  }, 10000);
}
function clearAutoRetry(){
  if(autoRetryTimer){ clearTimeout(autoRetryTimer); autoRetryTimer = null; }
}
async function saveAccounts(){
  const ok = await queuedStorageSet('expense_accounts', JSON.stringify(state.accounts), true);
  if(!ok){ state.saveError = {what:'your account changes', retry:saveAccounts}; scheduleAutoRetry(); render(); }
  else if(state.saveError && state.saveError.what==='your account changes'){ clearAutoRetry(); state.saveError=null; render(); }
}
async function saveTransactions(){
  const ok = await queuedStorageSet('transactions', JSON.stringify(state.transactions), true);
  if(!ok){ state.saveError = {what:'your transaction changes', retry:saveTransactions}; scheduleAutoRetry(); render(); }
  else if(state.saveError && state.saveError.what==='your transaction changes'){ clearAutoRetry(); state.saveError=null; render(); }
}
async function saveProjects(){
  const ok = await queuedStorageSet('projects', JSON.stringify(state.projects), true);
  if(!ok){ state.saveError = {what:'your project changes', retry:saveProjects}; scheduleAutoRetry(); render(); }
  else if(state.saveError && state.saveError.what==='your project changes'){ clearAutoRetry(); state.saveError=null; render(); }
}

/* ---------------------------- Ledger ---------------------------- */
function filteredTransactions(){
  const f = ui.ledger;
  const rows = transactionsForYear().filter(t=>{
    if(f.accountFilter && t.accountId !== f.accountFilter) return false;
    if(f.typeFilter){ const acc = getAccount(t.accountId); const accType = acc ? acc.type : 'Unassigned'; if(accType !== f.typeFilter) return false; }
    if(f.unassignedOnly && t.accountId !== UNASSIGNED_ID) return false;
    if(f.search){
      const s = f.search.toLowerCase();
      const proj = getProject(t.projectId);
      const hay = (t.description+' '+(t.source||'')+' '+(proj?proj.name:'')).toLowerCase();
      if(!hay.includes(s)) return false;
    }
    return true;
  });
  return sortTransactions(rows);
}

/* ---------------------------- Summary (rollup by classification) ---------------------------- */
function classificationTotal(type, yearTx){
  const ids = new Set(state.accounts.filter(a=>a.type===type).map(a=>a.id));
  return yearTx.reduce((s,t)=> ids.has(t.accountId) ? s+(Number(t.amount)||0) : s, 0);
}

function renderSummary(){
  const yearTx = transactionsForYear();
  const totals = {};
  ACCOUNT_TYPES.forEach(type=>{ totals[type] = classificationTotal(type, yearTx); });
  const netIncome = (totals.Revenue||0) - (totals.Expense||0);
  const unassignedTx = yearTx.filter(t=>!t.accountId || t.accountId===UNASSIGNED_ID);

  let html = `<h2 class="page-title">Account Summary</h2><p class="page-sub">Every account rolled up under its classification, for ${ui.yearFilter||'all years'}. Read-only — manage accounts themselves on the Accounts tab.</p>`;

  if(unassignedTx.length>0){
    const unassignedTotal = unassignedTx.reduce((s,t)=>s+(Number(t.amount)||0),0);
    html += `<div class="banner banner-warn">⚠ <b>${unassignedTx.length}</b> unassigned transaction${unassignedTx.length===1?'':'s'} (${fmtMoney(unassignedTotal)}) ${unassignedTx.length===1?'is':'are'} excluded from the totals below. <a class="linklike" onclick="App.setTab('ledger')">Go classify them</a></div>`;
  }

  // top-line tiles: one per classification, plus net income
  const TYPE_TILE_LABEL = { Asset:'Total Assets', Liability:'Total Liabilities', Equity:'Total Equity', Revenue:'Total Revenue', Expense:'Total Expenses' };
  html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px;">`;
  ACCOUNT_TYPES.forEach(type=>{
    html += `<div class="card" style="margin-bottom:0;padding:16px 18px;border-left:4px solid ${PALETTE_BY_TYPE[type]};">
      <div class="small" style="text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:6px;">${TYPE_TILE_LABEL[type]}</div>
      <div class="num" style="font-size:20px;text-align:left;">${fmtMoney(totals[type])}</div>
    </div>`;
  });
  html += `<div class="card" style="margin-bottom:0;padding:16px 18px;border-left:4px solid ${netIncome>=0?'var(--green)':'var(--maroon)'};">
    <div class="small" style="text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:6px;">Net Income</div>
    <div class="num" style="font-size:20px;text-align:left;color:${netIncome>=0?'var(--green-dark)':'var(--maroon)'};">${fmtMoney(netIncome)}</div>
  </div>`;
  html += `</div>`;

  // one detail card per classification, with a subtotal row
  ACCOUNT_TYPES.forEach(type=>{
    const classTotal = totals[type];
    const accs = state.accounts.filter(a=>a.type===type).sort((a,b)=>(parseInt(a.code,10)||0)-(parseInt(b.code,10)||0) || a.name.localeCompare(b.name));
    let rows = accs.map(a=>{
      const rowTx = yearTx.filter(t=>t.accountId===a.id);
      const sum = rowTx.reduce((s,t)=>s+(Number(t.amount)||0),0);
      const pct = classTotal!==0 ? Math.round((sum/Math.abs(classTotal))*100) : 0;
      return `<tr>
        <td class="mono">${escapeHtml(a.code)}</td>
        <td>${escapeHtml(a.name)}</td>
        <td class="small">${rowTx.length}</td>
        <td class="num">${fmtMoney(sum)}</td>
        <td style="width:140px;"><div class="catbar-wrap"><div class="catbar-track"><div class="catbar-fill" style="width:${Math.min(Math.abs(pct),100)}%;background:${PALETTE_BY_TYPE[type]};"></div></div><span class="small mono">${pct}%</span></div></td>
      </tr>`;
    }).join('');
    if(!rows) rows = `<tr><td colspan="5" class="small" style="padding:14px;text-align:center;">No ${type.toLowerCase()} accounts yet.</td></tr>`;

    html += `<div class="card">
      <div class="card-title"><span class="badge ${TYPE_BADGE[type]}">${type}</span><span class="num" style="font-size:15px;">${fmtMoney(classTotal)}</span></div>
      <div style="overflow-x:auto;">
      <table class="data">
        <thead><tr><th style="width:80px">Account #</th><th>Account</th><th>Count</th><th class="num">Total</th><th>Share of ${type.toLowerCase()}</th></tr></thead>
        <tbody>${rows}
          <tr class="totals-row"><td colspan="3">Total ${type}</td><td class="num">${fmtMoney(classTotal)}</td><td></td></tr>
        </tbody>
      </table>
      </div>
    </div>`;
  });

  return html;
}

/* ---------------------------- Excel export ---------------------------- */
function exportToExcelImpl(){
  const txs = transactionsForYear();
  const wsData = [['Date','Description','Source','Account #','Account','Project','Amount']];
  txs.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const acc = getAccount(t.accountId);
    const proj = getProject(t.projectId);
    wsData.push([t.date, t.description||'', t.source||'', acc?acc.code:'9999', acc?acc.name:'Unassigned', proj?proj.name:'', round2(t.amount)]);
  });
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:12},{wch:36},{wch:18},{wch:10},{wch:22},{wch:16},{wch:12}];

  const total = txs.reduce((s,t)=>s+(Number(t.amount)||0),0);
  const summaryData = [['Type','Account #','Account','Count','Total Amount']];
  ACCOUNT_TYPES.concat(['Unassigned']).forEach(type=>{
    state.accounts.filter(a=>a.type===type).sort((a,b)=>(parseInt(a.code,10)||0)-(parseInt(b.code,10)||0)).forEach(a=>{
      const rows = txs.filter(t=>t.accountId===a.id);
      if(rows.length===0) return;
      const sum = rows.reduce((s,t)=>s+(Number(t.amount)||0),0);
      summaryData.push([type, a.code, a.name, rows.length, round2(sum)]);
    });
  });
  summaryData.push(['','','Total', txs.length, round2(total)]);
  const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
  wsSummary['!cols'] = [{wch:12},{wch:10},{wch:26},{wch:10},{wch:14}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ledger');
  XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary by Account');
  XLSX.writeFile(wb, 'general-ledger-'+(ui.yearFilter||'all-years')+'.xlsx');
}

/* ---------------------------- App actions ---------------------------- */
const App = {
  onNameInput(v){ ui.nameInput = v; },
  onPasscodeInput(v){ ui.passcodeInput = v; },
  submitPasscode(){
    const val = (ui.passcodeInput||'').trim();
    if(!val){ ui.passcodeError = 'Enter the team passcode.'; render(); return; }
    ui.passcodeBusy = true; ui.passcodeError = ''; render();
    fbAuth.signInWithEmailAndPassword(TEAM_AUTH_EMAIL, val)
      .catch(err=>{
        ui.passcodeBusy = false;
        const code = err && err.code;
        if(code==='auth/wrong-password' || code==='auth/invalid-credential' || code==='auth/invalid-login-credentials'){
          ui.passcodeError = 'Incorrect passcode. Try again.';
        } else if(code==='auth/too-many-requests'){
          ui.passcodeError = 'Too many attempts — wait a moment and try again.';
        } else {
          // Anything else (network/config/sandboxing issues, etc.) — show the real
          // error so it can actually be diagnosed instead of being misreported.
          ui.passcodeError = 'Sign-in error: '+(code || (err && err.message) || 'unknown error');
        }
        render();
      });
    // on success, the onAuthStateChanged listener below flips state.authed and loads data
  },
  dismissToast(){ ui.toast = null; render(); },
  confirmModalYes(){
    const cb = ui.confirmModal && ui.confirmModal.onConfirm;
    ui.confirmModal = null;
    if(cb) cb();
    else render();
  },
  confirmModalNo(){ ui.confirmModal = null; render(); },
  enterApp(){
    const name = (ui.nameInput||'').trim();
    if(!name){ showToast('Please enter your name to continue.'); return; }
    state.currentUser = name;
    saveLastUser(name);
    touchActivity(name+' signed in');
    render();
  },
  switchUser(){ state.currentUser = null; render(); },
  setTab(tab){ state.activeTab = tab; render(); },
  setYearFilter(v){ ui.yearFilter = v; ui.ledger.page = 1; render(); },
  retrySave(){ clearAutoRetry(); if(state.saveError && state.saveError.retry){ state.saveError.retry(); } },
  exportToExcel(){
    if(state.transactions.length===0){ showToast('Nothing to export yet — upload or add some transactions first.'); return; }
    exportToExcelImpl();
  },

  /* ---- upload ---- */
  handleFile(evt){
    const file = evt.target.files[0];
    if(!file) return;
    const name = file.name.toLowerCase();
    if(name.endsWith('.csv')){
      Papa.parse(file, { header:true, skipEmptyLines:true, complete:(res)=>{
        const headers = res.meta.fields || [];
        App._stageUpload(file.name, headers, res.data);
      }});
    } else {
      const reader = new FileReader();
      reader.onload = (e)=>{
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, {raw:false, defval:''});
        const headers = json.length ? Object.keys(json[0]) : [];
        App._stageUpload(file.name, headers, json);
      };
      reader.readAsArrayBuffer(file);
    }
  },
  _stageUpload(filename, headers, rows){
    ui.upload.stage = { filename, headers, rows };
    const g = (...n)=>guessHeader(headers, ...n);
    ui.upload.mapping = {
      date: g('date'),
      description: g('desc','memo','narrative','detail','name'),
      source: g('source','vendor','payee','merchant'),
      project: g('project','job','cost center','costcenter'),
      account: g('account','categ'),
      amount: g('amount','value','total')
    };
    render();
  },
  setMapping(field, value){ ui.upload.mapping[field] = value || null; render(); },
  cancelUpload(){ ui.upload.stage = null; render(); },
  dismissUploadResult(){ ui.upload.result = null; render(); },

  loadSampleData(){
    const today = new Date();
    const iso = (daysAgo)=>{ const d=new Date(today); d.setDate(d.getDate()-daysAgo); return d.toISOString().slice(0,10); };
    const samples = [
      [iso(28),'Client invoice — March retainer','Acme Co','',3200,'Service Revenue'],
      [iso(25),'Verizon Wireless','Verizon','',128.40,'Utilities'],
      [iso(22),'Home Depot — mulch & supplies','Home Depot','Spring grounds refresh',214.75,'Landscaping & Grounds'],
      [iso(20),'Staples — paper & toner','Staples','',64.10,''],
      [iso(18),'State Farm — liability policy','State Farm','',410.00,'Insurance'],
      [iso(15),'Law Office of J. Wickersham','Wickersham Law','Bylaw revision',650.00,'Professional & Legal Fees'],
      [iso(12),'Adobe Creative Cloud','Adobe','',54.99,'Software & Subscriptions'],
      [iso(9),'GreenScape Lawn Care — monthly','GreenScape','',380.00,''],
      [iso(5),'Bank monthly service fee','First National Bank','',15.00,'Bank & Merchant Fees'],
      [iso(2),'Facebook Ads — spring promo','Meta','Spring promo',95.50,'Marketing & Advertising']
    ];
    let added=0, newAccs=0, newProjs=0;
    samples.forEach(([date,desc,source,projectName,amount,accName])=>{
      let accountId = UNASSIGNED_ID;
      if(accName){
        let acc = findAccountByName(accName);
        if(!acc){ acc = createAccount(accName,'Expense'); newAccs++; }
        accountId = acc.id;
      }
      let projectId = '';
      if(projectName){
        let proj = findProjectByName(projectName);
        if(!proj){ proj = createProject(projectName,''); newProjs++; }
        projectId = proj.id;
      }
      state.transactions.push({ id:genId('tx'), date, description:desc, source, projectId, amount, accountId, importedFrom:'sample data', enteredBy: state.currentUser, importedAt:new Date().toISOString() });
      added++;
    });
    saveTransactions();
    if(newAccs) saveAccounts();
    if(newProjs) saveProjects();
    touchActivity(state.currentUser+' loaded '+added+' sample transactions');
    state.activeTab='ledger';
    render();
  },

  confirmImport(){
    const map = ui.upload.mapping;
    if(!map.date || !map.description || !map.amount){ showToast('Please map Date, Description, and Amount.'); return; }
    const stage = ui.upload.stage;
    const newTxs = [];
    const newAccs = [];
    const newProjs = [];
    let errors = 0;
    let duplicates = 0;
    const existingSigs = new Set(state.transactions.map(t=>txSignature(t.date, t.description, t.amount, t.source)));
    const seenInBatch = new Set();
    stage.rows.forEach(row=>{
      const iso = parseDateToISO(row[map.date]);
      const desc = row[map.description];
      if(!iso || desc===undefined){ errors++; return; }
      const amount = round2(parseAmount(row[map.amount]));
      const source = map.source ? String(row[map.source]||'') : '';
      const sig = txSignature(iso, desc, amount, source);
      if(existingSigs.has(sig) || seenInBatch.has(sig)){ duplicates++; return; }
      seenInBatch.add(sig);
      let projectId = '';
      if(map.project){
        const projStr = row[map.project];
        if(projStr){
          let proj = findProjectByName(projStr);
          if(!proj){ proj = createProject(projStr, ''); newProjs.push(proj); }
          projectId = proj.id;
        }
      }
      let accountId = UNASSIGNED_ID;
      if(map.account){
        const accStr = row[map.account];
        if(accStr){
          let acc = findAccountByCode(accStr) || findAccountByName(accStr);
          if(!acc){ acc = createAccount(accStr, 'Expense'); newAccs.push(acc); }
          accountId = acc.id;
        }
      }
      newTxs.push({ id:genId('tx'), date:iso, description:String(desc||''), source, projectId, amount, accountId, importedFrom: stage.filename, enteredBy: state.currentUser, importedAt:new Date().toISOString() });
    });
    state.transactions = state.transactions.concat(newTxs);
    saveTransactions();
    if(newAccs.length) saveAccounts();
    if(newProjs.length) saveProjects();
    touchActivity(state.currentUser+' imported '+newTxs.length+' transactions from "'+stage.filename+'"'+(duplicates?' ('+duplicates+' duplicate row(s) skipped)':''));
    ui.upload.result = { imported:newTxs.length, newAccs, newProjs, errors, duplicates };
    ui.upload.stage = null;
    state.activeTab = 'ledger';
    render();
  },

  /* ---- ledger ---- */
  setLedgerFilter(field, value){ ui.ledger[field] = value; ui.ledger.page = 1; render(); },
  setLedgerFilterBool(field, value){ ui.ledger[field] = !!value; ui.ledger.page = 1; render(); },
  setTypeFilter(value){ ui.ledger.typeFilter = value; ui.ledger.accountFilter = ''; ui.ledger.page = 1; render(); },
  setAccountFilter(value){ ui.ledger.accountFilter = value; if(value) ui.ledger.typeFilter = ''; ui.ledger.page = 1; render(); },
  setSort(key){
    if(ui.ledger.sortBy===key){
      ui.ledger.sortDir = ui.ledger.sortDir==='asc' ? 'desc' : 'asc';
    } else {
      ui.ledger.sortBy = key;
      ui.ledger.sortDir = SORT_DEFAULT_DIR[key] || 'asc';
    }
    ui.ledger.page = 1;
    render();
  },
  ledgerPage(p){ ui.ledger.page = p; render(); },
  reclassify(txId, newAccId){
    const t = state.transactions.find(x=>x.id===txId);
    if(!t) return;
    const newAcc = getAccount(newAccId);
    t.accountId = newAccId;
    saveTransactions();
    touchActivity(state.currentUser+' reclassified "'+(t.description||'a transaction')+'" to '+(newAcc?newAcc.name:'?'));
    render();
  },
  startTxEdit(txId){
    const t = state.transactions.find(x=>x.id===txId);
    if(!t) return;
    ui.ledger.editingId = txId;
    ui.ledger.editBuffer = { date:t.date, description:t.description||'', source:t.source||'', projectId:t.projectId||'', amount:t.amount||'' };
    render();
  },
  cancelTxEdit(){ ui.ledger.editingId=null; render(); },
  saveTxEdit(txId){
    const t = state.transactions.find(x=>x.id===txId);
    if(!t) return;
    const b = ui.ledger.editBuffer;
    t.date = parseDateToISO(b.date) || b.date;
    t.description = b.description;
    t.source = b.source;
    t.projectId = b.projectId;
    t.amount = round2(parseAmount(b.amount));
    ui.ledger.editingId = null;
    saveTransactions();
    touchActivity(state.currentUser+' edited "'+(t.description||'a transaction')+'"');
    render();
  },
  deleteTx(txId){
    const t = state.transactions.find(x=>x.id===txId);
    if(!t) return;
    showConfirmModal('Delete this transaction: "'+(t.description||'untitled')+'" ('+fmtDate(t.date)+')?', ()=>{
      state.transactions = state.transactions.filter(x=>x.id!==txId);
      saveTransactions();
      touchActivity(state.currentUser+' deleted "'+(t.description||'a transaction')+'"');
      render();
    });
  },
  toggleAddTx(){ ui.ledger.addOpen = !ui.ledger.addOpen; render(); },
  addTransaction(){
    const n = ui.ledger.newTx;
    const iso = parseDateToISO(n.date);
    if(!iso || !n.description.trim()){ showToast('Please enter a date and description.'); return; }
    state.transactions.push({ id:genId('tx'), date:iso, description:n.description, source:n.source||'', projectId:n.projectId||'', amount: round2(parseAmount(n.amount)), accountId: n.accountId || UNASSIGNED_ID, importedFrom:'manual', enteredBy: state.currentUser, importedAt:new Date().toISOString() });
    saveTransactions();
    touchActivity(state.currentUser+' added "'+n.description+'"');
    ui.ledger.newTx = {date:'',description:'',source:'',projectId:'',amount:'',accountId:''};
    ui.ledger.addOpen = false;
    render();
  },

  /* ---- accounts ---- */
  toggleAddAccount(){
    ui.accounts.addOpen = !ui.accounts.addOpen;
    if(ui.accounts.addOpen){
      const t = ui.accounts.newAcc.type || 'Expense';
      ui.accounts.newAcc = { code: nextCodeForType(t), name:'', type: t };
    }
    render();
  },
  newAccountTypeChange(type){
    ui.accounts.newAcc.type = type;
    ui.accounts.newAcc.code = nextCodeForType(type);
    render();
  },
  addAccount(){
    const n = ui.accounts.newAcc;
    const name = n.name.trim();
    const code = (n.code||'').trim();
    if(!name){ showToast('Enter an account name.'); return; }
    if(!code){ showToast('Enter an account number.'); return; }
    if(findAccountByName(name)){ showToast('That account already exists.'); return; }
    if(findAccountByCode(code)){ showToast('Account number '+code+' is already in use.'); return; }
    createAccount(name, n.type, code);
    saveAccounts();
    touchActivity(state.currentUser+' added account '+code+' — "'+name+'" ('+n.type+')');
    ui.accounts.addOpen = false;
    ui.accounts.newAcc = {code:'',name:'',type:'Expense'};
    showToast('Account '+code+' — "'+name+'" added.', 'ok');
  },
  updateAccountCode(accId, newCode){
    const acc = getAccount(accId);
    if(!acc) return;
    const trimmed = newCode.trim();
    if(!trimmed){ render(); return; }
    const clash = findAccountByCode(trimmed);
    if(clash && clash.id!==accId){ showToast('Account number '+trimmed+' is already used by "'+clash.name+'".'); return; }
    const oldCode = acc.code;
    acc.code = trimmed;
    saveAccounts();
    touchActivity(state.currentUser+' changed account number for "'+acc.name+'" from '+oldCode+' to '+trimmed);
    render();
  },
  renameAccount(accId, newName){
    const acc = getAccount(accId);
    if(!acc) return;
    const trimmed = newName.trim();
    if(!trimmed){ render(); return; }
    const oldName = acc.name;
    acc.name = trimmed;
    saveAccounts();
    touchActivity(state.currentUser+' renamed account "'+oldName+'" to "'+trimmed+'"');
    render();
  },
  retypeAccount(accId, newType){
    const acc = getAccount(accId);
    if(!acc) return;
    const oldType = acc.type;
    acc.type = newType;
    saveAccounts();
    touchActivity(state.currentUser+' changed "'+acc.name+'" from '+oldType+' to '+newType);
    render();
  },
  deleteAccount(accId){
    const acc = getAccount(accId);
    if(!acc || acc.isDefault) return;
    const inUse = state.transactions.some(t=>t.accountId===accId);
    if(inUse){ showToast('This account has transactions assigned and cannot be deleted.'); return; }
    showConfirmModal('Delete account "'+acc.code+' — '+acc.name+'"?', ()=>{
      state.accounts = state.accounts.filter(a=>a.id!==accId);
      saveAccounts();
      touchActivity(state.currentUser+' deleted account "'+acc.name+'"');
      render();
    });
  },

  /* ---- projects ---- */
  toggleAddProject(){ ui.projects.addOpen = !ui.projects.addOpen; render(); },
  addProject(){
    const n = ui.projects.newProj;
    const name = n.name.trim();
    if(!name){ showToast('Enter a project name.'); return; }
    if(findProjectByName(name)){ showToast('That project already exists.'); return; }
    createProject(name, n.description||'');
    saveProjects();
    touchActivity(state.currentUser+' added project "'+name+'"');
    ui.projects.addOpen = false;
    ui.projects.newProj = {name:'',description:''};
    render();
  },
  renameProject(projId, newName){
    const proj = getProject(projId);
    if(!proj) return;
    const trimmed = newName.trim();
    if(!trimmed){ render(); return; }
    const oldName = proj.name;
    proj.name = trimmed;
    saveProjects();
    touchActivity(state.currentUser+' renamed project "'+oldName+'" to "'+trimmed+'"');
    render();
  },
  updateProjectDescription(projId, newDesc){
    const proj = getProject(projId);
    if(!proj) return;
    proj.description = newDesc;
    saveProjects();
    touchActivity(state.currentUser+' updated description for project "'+proj.name+'"');
    render();
  },
  deleteProject(projId){
    const proj = getProject(projId);
    if(!proj) return;
    const inUse = state.transactions.some(t=>t.projectId===projId);
    if(inUse){ showToast('This project has transactions assigned and cannot be deleted.'); return; }
    showConfirmModal('Delete project "'+proj.name+'"?', ()=>{
      state.projects = state.projects.filter(p=>p.id!==projId);
      saveProjects();
      touchActivity(state.currentUser+' deleted project "'+proj.name+'"');
      render();
    });
  }
};

fbAuth.onAuthStateChanged(user=>{
  if(user){
    state.authed = true;
    loadAll();
  } else {
    state.authed = false;
    state.ready = true; // so render() shows the passcode gate instead of "Loading…"
    render();
  }
});
</script>
</body>
</html>
